# pre-commit hooks 配置
# 使用方式:
#   1. pip install pre-commit
#   2. pre-commit install   # 安装 git hook
#   3. pre-commit run --all-files  # 全量执行一次
#
# 提交时会自动执行以下检查,失败则阻止提交(可用 git commit --no-verify 跳过,不推荐)
# 内网环境:首次执行需联网拉取 hook 仓库,后续走本地缓存;
#          完全离线时可使用 `pre-commit clean` 后改用本地 hook(见 ruff/mypy 配置)

repos:
  # ===== 通用文件检查 =====
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace      # 去除行尾空格
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer        # 文件末尾补换行
      - id: check-yaml               # YAML 语法检查
        args: [--allow-multiple-docs]  # prebuiltconfigs/*.yaml 多文档
      - id: check-json               # JSON 语法检查
      - id: check-merge-conflict     # 阻止合并冲突标记入库
      - id: check-added-large-files  # 阻止大文件入库(>500KB)
        args: [--maxkb=500]
      - id: check-case-conflict      # 文件名大小写冲突(macOS/Windows 不敏感)
      - id: mixed-line-ending        # 统一换行符为 LF
        args: [--fix=lf]

  # ===== Python: Ruff (lint + format) =====
  # 使用本地安装的 ruff(随 dev extras 安装),避免内网环境拉取远程仓库
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: false
        args: [src, tests]

      - id: ruff-format
        name: ruff format --check
        entry: ruff format --check
        language: system
        types: [python]
        pass_filenames: false
        args: [src, tests]

      - id: mypy
        name: mypy (src only)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [src]
        # 暂设为 advisory:代码库尚未完全达到 strict 合规,不阻塞提交
        # 待类型债务清理后移除 stages 配置即可恢复 blocking
        stages: [manual]

  # ===== 前端: TypeScript 类型检查 =====
  # 仅检查不构建,快速反馈类型错误
  - repo: local
    hooks:
      - id: tsc-check
        name: tsc --noEmit (frontend)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
