kind: source
name: oracle-source
type: oracle
connectionString: ${ORACLE_CONNECTION_STRING}
walletLocation: ${ORACLE_WALLET:}
user: ${ORACLE_USERNAME}
password: ${ORACLE_PASSWORD}
useOCI: ${ORACLE_USE_OCI:false}
---
kind: tool
name: execute_sql
type: oracle-execute-sql
source: oracle-source
description: 执行任意 SQL 语句。
---
kind: tool
name: list_tables
type: oracle-sql
source: oracle-source
description: 列出连接 Schema 中的所有用户表，包括段大小、行数和最近分析日期。支持按表名列表过滤，省略则列出当前用户 Schema 中的所有表。
statement: |
  SELECT
        t.table_name,
        NVL(SUM(s.bytes), 0) AS segment_size_bytes,
        t.num_rows,
        t.last_analyzed
  FROM  user_tables t
  LEFT JOIN user_segments s ON t.table_name = s.segment_name AND s.segment_type IN ('TABLE', 'TABLE PARTITION', 'TABLE SUBPARTITION')
  WHERE (:1 IS NULL OR INSTR(',' || :1 || ',', ',' || t.table_name || ',') > 0)
  GROUP BY t.table_name, t.num_rows, t.last_analyzed
parameters:
- name: table_names_csv
  type: string
  description: "可选：表名的逗号分隔列表。如果为空，将列出用户可访问 Schema 中所有表的详细信息。"
  default: ""
---
kind: tool
name: list_active_sessions
type: oracle-sql
source: oracle-source
description: 列出当前正在运行的数据库会话（STATUS='ACTIVE'）的前 N 条（默认 50），显示 SID、OS 用户、程序以及当前 SQL 语句文本。
statement: |
  SELECT
         s.sid,
         s.serial#,
         s.username,
         s.osuser,
         s.program,
         s.status,
         s.wait_class,
         s.event,
         sql.sql_text
     FROM
         v$session s,
         v$sql sql
     WHERE
         s.status = 'ACTIVE'
         AND s.sql_id = sql.sql_id (+)
         AND s.audsid != userenv('sessionid') -- Exclude current session
     ORDER BY s.last_call_et DESC
     FETCH FIRST 50 ROWS ONLY
---
kind: tool
name: get_query_plan
type: oracle-sql
source: oracle-source
description: 使用 EXPLAIN PLAN 为单条 SQL 语句生成完整的执行计划。可用于在不执行的情况下分析查询性能。需要 SQL 语句作为参数输入。
statement: |
  DECLARE
      plan_output CLOB;
  BEGIN
      EXECUTE IMMEDIATE 'EXPLAIN PLAN FOR ' || :query;
      SELECT DBMS_XPLAN.DISPLAY() INTO plan_output FROM DUAL;
      -- The result of a PL/SQL block with an OUT parameter is returned by the driver.
      -- We use a dummy SELECT to conform to tool structure, but the actual output is plan_output.
      :plan := plan_output;
  END;
parameters:
- name: query
  type: string
  description: 要为其生成计划的 SQL 语句（省略 EXPLAIN 关键字）。
---
kind: tool
name: list_top_sql_by_resource
type: oracle-sql
source: oracle-source
description: 根据所选资源指标（CPU、I/O 或 Elapsed Time）从库缓存中列出前 N 条（默认 5）SQL 语句。显示 SQL ID、执行次数、缓冲区获取数、磁盘读取数、CPU 时间和 Elapsed Time。
statement: |
  SELECT
      sql_id,
      executions,
      buffer_gets,
      disk_reads,
      cpu_time / 1000000 AS cpu_seconds,
      elapsed_time / 1000000 AS elapsed_seconds
  FROM
      v$sql
  ORDER BY
      CASE UPPER(:1)
        WHEN 'CPU_TIME' THEN cpu_time
        WHEN 'DISK_READS' THEN disk_reads
        WHEN 'BUFFER_GETS' THEN buffer_gets
        ELSE elapsed_time
      END DESC
  FETCH FIRST :2 ROWS ONLY
parameters:
- name: metric
  type: string
  description: "可选：用于排序的资源指标。支持的值：'elapsed_time'（默认）、'cpu_time'、'disk_reads'、'buffer_gets'。"
  default: "elapsed_time"
- name: limit
  type: integer
  description: "可选：返回的最大行数（默认 5）。"
  default: 5
---
kind: tool
name: list_tablespace_usage
type: oracle-sql
source: oracle-source
description: 列出表空间名称、总大小、空闲空间和使用百分比，用于监控存储利用率。
statement: |
  SELECT
      t.tablespace_name,
      TO_CHAR(t.total_bytes / 1024 / 1024, '99,999.00') AS total_mb,
      TO_CHAR(SUM(d.bytes) / 1024 / 1024, '99,999.00') AS free_mb,
      TO_CHAR((t.total_bytes - SUM(d.bytes)) / t.total_bytes * 100, '99.00') AS used_pct
  FROM
      (SELECT tablespace_name, SUM(bytes) AS total_bytes FROM dba_data_files GROUP BY tablespace_name) t,
      dba_free_space d
  WHERE
      t.tablespace_name = d.tablespace_name (+)
  GROUP BY
      t.tablespace_name, t.total_bytes
  ORDER BY
      used_pct DESC
---
kind: tool
name: list_invalid_objects
type: oracle-sql
source: oracle-source
description: 列出所有处于无效状态、需要重新编译的数据库对象（例如存储过程、函数、视图）。
statement: |
  SELECT
      owner,
      object_type,
      object_name,
      status
  FROM
      dba_objects
  WHERE
      status = 'INVALID'
      AND owner NOT IN ('SYS', 'SYSTEM') -- Exclude system schemas for clarity
  ORDER BY
      owner, object_type, object_name
---
kind: toolset
name: oracle_database_tools
tools:
- execute_sql
- list_tables
- list_active_sessions
- get_query_plan
- list_top_sql_by_resource
- list_tablespace_usage
- list_invalid_objects
