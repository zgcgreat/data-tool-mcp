kind: source
name: mssql-source
type: mssql
host: ${MSSQL_HOST:localhost}
port: ${MSSQL_PORT:1433}
database: ${MSSQL_DATABASE}
user: ${MSSQL_USER}
password: ${MSSQL_PASSWORD}
---
kind: tool
name: execute_sql
type: mssql-execute-sql
source: mssql-source
description: 使用此工具执行 SQL。
---
kind: tool
name: list_tables
type: mssql-list-tables
source: mssql-source
description: 以 JSON 格式列出用户创建的表（普通表或分区表）的详细 Schema 信息（对象类型、列、约束、索引、触发器、注释）。支持按表名列表过滤，省略则列出所有用户 Schema 中的表。
---
kind: toolset
name: data
tools:
- execute_sql
- list_tables
