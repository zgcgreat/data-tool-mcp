kind: source
name: clickhouse-source
type: clickhouse
host: ${CLICKHOUSE_HOST}
port: ${CLICKHOUSE_PORT}
user: ${CLICKHOUSE_USER}
password: ${CLICKHOUSE_PASSWORD}
database: ${CLICKHOUSE_DATABASE}
protocol: ${CLICKHOUSE_PROTOCOL}
---
kind: tool
name: execute_sql
type: clickhouse-execute-sql
source: clickhouse-source
description: 使用此工具执行 SQL。
---
kind: tool
name: list_databases
type: clickhouse-list-databases
source: clickhouse-source
description: 使用此工具列出 ClickHouse 中的所有数据库。
---
kind: tool
name: list_tables
type: clickhouse-list-tables
source: clickhouse-source
description: 使用此工具列出指定 ClickHouse 数据库中的所有表。
---
kind: toolset
name: clickhouse_database_tools
tools:
- execute_sql
- list_databases
- list_tables
