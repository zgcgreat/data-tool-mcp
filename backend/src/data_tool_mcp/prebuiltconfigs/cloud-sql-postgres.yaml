kind: tool
name: list_tables
type: postgres-list-tables
source: cloudsql-pg-source
description: 以 JSON 格式列出用户创建的表（普通表或分区表）的详细模式信息（对象类型、列、约束、索引、触发器、所有者、注释）。支持按逗号分隔的名称列表进行过滤。如果省略名称，则列出用户模式中的所有表。
---
kind: tool
name: list_active_queries
type: postgres-list-active-queries
source: cloudsql-pg-source
description: 列出 pg_stat_activity 中当前运行的（state='active'）前 N 条（默认 50）查询，按运行时间最长者优先排序。返回 pid、用户、数据库、application_name、client_addr、状态、wait_event_type/wait_event、backend/xact/query 开始时间、计算的 query_duration 以及 SQL 文本。
---
kind: tool
name: list_available_extensions
type: postgres-list-available-extensions
source: cloudsql-pg-source
description: 发现此服务器上可安装的所有 PostgreSQL 扩展，返回名称、默认版本和描述。
---
kind: tool
name: list_installed_extensions
type: postgres-list-installed-extensions
source: cloudsql-pg-source
description: 列出所有已安装的 PostgreSQL 扩展及其名称、版本、模式、所有者和描述。
---
kind: tool
name: long_running_transactions
type: postgres-long-running-transactions
source: cloudsql-pg-source
description: 识别并列出超过指定时间限制的数据库事务。对于每个长时间运行的事务，输出包含进程 ID、数据库名称、用户名、应用程序名称、客户端地址、状态、连接时长、事务时长、查询时长、最后活动时长、等待事件类型、等待事件和查询字符串。
---
kind: tool
name: list_locks
type: postgres-list-locks
source: cloudsql-pg-source
description: 识别活动进程持有的所有锁，显示进程 ID、用户、查询文本，以及与每个进程关联的所有事务和特定锁（关系、模式、授予状态）的聚合列表。
---
kind: tool
name: replication_stats
type: postgres-replication-stats
source: cloudsql-pg-source
description: 列出每个副本的进程 ID、用户名、应用程序名称、backend_xmin（由 hot_standby_feedback 报告的备用节点 xmin 水平线）、客户端 IP 地址、连接状态和 sync_state，以及 sent_lag（主节点到已发送）、write_lag（已发送到已写入）、flush_lag（已写入到已刷新）、replay_lag（已刷新到已重放）和总体 total_lag（主节点到已重放）的字节延迟大小。
---
kind: tool
name: list_autovacuum_configurations
type: postgres-sql
source: cloudsql-pg-source
description: 列出 pg_settings 中 PostgreSQL autovacuum 相关配置（名称和当前设置）。
statement: |
  SELECT name,
      setting
  FROM   pg_settings
  WHERE  category = 'Autovacuum';
---
kind: tool
name: list_memory_configurations
type: postgres-sql
source: cloudsql-pg-source
description: 列出 pg_settings 中 PostgreSQL 内存相关配置（名称和当前设置）。
statement: |
  (
      SELECT
      name,
      pg_size_pretty((setting::bigint * 1024)::bigint) setting
      FROM pg_settings
      WHERE name IN ('work_mem', 'maintenance_work_mem')
  )
  UNION ALL
  (
      SELECT
      name,
      pg_size_pretty((((setting::bigint) * 8) * 1024)::bigint)
      FROM pg_settings
      WHERE name IN ('shared_buffers', 'wal_buffers', 'effective_cache_size', 'temp_buffers')
  )
  ORDER BY 1 DESC;
---
kind: tool
name: list_top_bloated_tables
type: postgres-sql
source: cloudsql-pg-source
description: |
  列出按死元组（近似膨胀信号）排序的前若干张表，返回模式、表、活/死元组、百分比以及上次 vacuum/analyze 的时间。
statement: |
  SELECT
      schemaname AS schema_name,
      relname AS relation_name,
      n_live_tup AS live_tuples,
      n_dead_tup AS dead_tuples,
      TRUNC((n_dead_tup::NUMERIC / NULLIF(n_live_tup + n_dead_tup, 0)) * 100, 2) AS dead_tuple_percentage,
      last_vacuum,
      last_autovacuum,
      last_analyze,
      last_autoanalyze
  FROM pg_stat_user_tables
  ORDER BY n_dead_tup DESC
  LIMIT COALESCE($1::int, 50);
parameters:
- name: limit
  description: 要返回的最大结果数。
  type: integer
  default: 50
---
kind: tool
name: list_replication_slots
type: postgres-sql
source: cloudsql-pg-source
description: 列出所有 PostgreSQL 复制槽的关键细节（例如类型、数据库、活动状态），并计算被该槽阻止删除的未处理 WAL 的大小。
statement: |
  SELECT
  slot_name,
  slot_type,
  plugin,
  database,
  temporary,
  active,
  restart_lsn,
  confirmed_flush_lsn,
  xmin,
  catalog_xmin,
  pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS retained_wal
  FROM pg_replication_slots;
---
kind: tool
name: list_invalid_indexes
type: postgres-sql
source: cloudsql-pg-source
description: 列出所有无效的 PostgreSQL 索引，这些索引占用磁盘空间但查询规划器无法使用。通常由失败的 CREATE INDEX CONCURRENTLY 操作创建。
statement: |
  SELECT
      nspname AS schema_name,
      indexrelid::regclass AS index_name,
      indrelid::regclass AS table_name,
      pg_size_pretty(pg_total_relation_size(indexrelid)) AS index_size,
      indisready,
      indisvalid,
      pg_get_indexdef(pg_class.oid) AS index_def
  FROM pg_index
  JOIN pg_class ON pg_class.oid = pg_index.indexrelid
  JOIN pg_namespace ON pg_namespace.oid = pg_class.relnamespace
  WHERE indisvalid = FALSE;
---
kind: tool
name: get_query_plan
type: postgres-sql
source: cloudsql-pg-source
description: 为单条 SQL 语句生成 JSON 格式的 PostgreSQL EXPLAIN 计划——不会执行该语句。返回优化器估计的计划、成本和行数（无 ANALYZE，无额外选项）。可在生产环境中安全用于计划检查、回归测试和查询调优工作流。
statement: |
  EXPLAIN (FORMAT JSON) {{.query}};
templateParameters:
- name: query
  type: string
  description: 要为其生成计划的 SQL 语句（省略 EXPLAIN 关键字）。
  required: true
