kind: tool
name: get_query_metrics
type: cloud-monitoring-query-prometheus
source: cloud-monitoring-source
description: |
  使用 PromQL 查询获取 Postgres 实例中运行查询的查询级 cloudmonitoring 数据（时间序列指标）。从用户处获取需要获取指标时间序列数据的 projectID 和 instanceID。
  使用此工具时，必须提供 Google Cloud 的 `projectId` 和 PromQL `query`。
  
  为 Postgres 查询指标生成 PromQL `query`。使用提供的指标和规则构建查询，从用户意图中获取 `instance_id`、`query_hash` 等标签。如果提供了 query_hash，则使用按查询指标。查询哈希和查询 ID 相同。
  
  默认值：
  1. 时间间隔：除非用户指定了不同的时间窗口，否则 `_over_time` 聚合函数使用默认间隔 `5m`。
  
  PromQL 查询示例：
  1. 基本时间序列：`avg_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m])`
  2. Top K：`topk(30, avg_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m]))`
  3. 平均值：`avg(avg_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m]))`
  4. 最小值：`min(min_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m]))`
  5. 最大值：`max(max_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m]))`
  6. 总和：`sum(avg_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m]))`
  7. 计数流：`count(avg_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m]))`
  8. 按 resource_id、database 分组的百分位数：`quantile by ("resource_id","database")(0.99,avg_over_time({"__name__"="cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time","monitored_resource"="cloudsql_instance_database","project_id"="my-projectId","resource_id"="my-projectId:my-instanceId"}[5m]))`
  
  可用指标列表：指标名称。描述。受监控资源。标签。resource_id 标签格式为 `project_id:instance_id`，实际上只是实例 ID。aggregate 是所有查询统计的聚合值，如果未提供查询 ID，请使用聚合指标。对于 perquery 指标，除非用户明确指定，否则不要获取 querystring。请在 query hash 上进行聚合以避免获取 querystring。不要将延迟指标用于任何用途。
  1. `cloudsql.googleapis.com/database/postgresql/insights/aggregate/latencies`: 聚合查询延迟分布。`cloudsql_instance_database`。`user`, `client_addr`, `project_id`, `resource_id`。
  2. `cloudsql.googleapis.com/database/postgresql/insights/aggregate/execution_time`: 自上次采样以来累计的聚合查询执行时间。`cloudsql_instance_database`。`user`, `client_addr`, `project_id`, `resource_id`。
  3. `cloudsql.googleapis.com/database/postgresql/insights/aggregate/io_time`: 自上次采样以来累计的聚合 IO 时间。`cloudsql_instance_database`。`user`, `client_addr`, `io_type`, `project_id`, `resource_id`。
  4. `cloudsql.googleapis.com/database/postgresql/insights/aggregate/lock_time`: 自上次采样以来累计的聚合锁等待时间。`cloudsql_instance_database`。`user`, `client_addr`, `lock_type`, `project_id`, `resource_id`。
  5. `cloudsql.googleapis.com/database/postgresql/insights/aggregate/row_count`: 自上次采样以来检索或受影响行的聚合数量。`cloudsql_instance_database`。`user`, `client_addr`, `project_id`, `resource_id`。
  6. `cloudsql.googleapis.com/database/postgresql/insights/aggregate/shared_blk_access_count`: 语句执行访问的聚合共享块数量。`cloudsql_instance_database`。`user`, `client_addr`, `access_type`, `project_id`, `resource_id`。
  7. `cloudsql.googleapis.com/database/postgresql/insights/perquery/latencies`: 每查询延迟分布。`cloudsql_instance_database`。`user`, `client_addr`, `querystring`, `query_hash`, `project_id`, `resource_id`。
  8. `cloudsql.googleapis.com/database/postgresql/insights/perquery/execution_time`: 每用户每数据库每查询的累计执行时间。`cloudsql_instance_database`。`user`, `client_addr`, `querystring`, `query_hash`, `project_id`, `resource_id`。
  9. `cloudsql.googleapis.com/database/postgresql/insights/perquery/io_time`: 自上次采样以来每查询的累计 IO 时间。`cloudsql_instance_database`。`user`, `client_addr`, `io_type`, `querystring`, `query_hash`, `project_id`, `resource_id`。
  10. `cloudsql.googleapis.com/database/postgresql/insights/perquery/lock_time`: 自上次采样以来每查询的累计锁等待时间。`cloudsql_instance_database`。`user`, `client_addr`, `lock_type`, `querystring`, `query_hash`, `project_id`, `resource_id`。
  11. `cloudsql.googleapis.com/database/postgresql/insights/perquery/row_count`: 自上次采样以来每查询检索或受影响的行数。`cloudsql_instance_database`。`user`, `client_addr`, `querystring`, `query_hash`, `project_id`, `resource_id`。
  12. `cloudsql.googleapis.com/database/postgresql/insights/perquery/shared_blk_access_count`: 每查询语句执行访问的共享块数量。`cloudsql_instance_database`。`user`, `client_addr`, `access_type`, `querystring`, `query_hash`, `project_id`, `resource_id`。
  13. `cloudsql.googleapis.com/database/postgresql/insights/pertag/latencies`: 查询延迟分布。`cloudsql_instance_database`。`user`, `client_addr`, `action`, `application`, `controller`, `db_driver`, `framework`, `route`, `tag_hash`, `project_id`, `resource_id`。
  14. `cloudsql.googleapis.com/database/postgresql/insights/pertag/execution_time`: 自上次采样以来累计的执行时间。`cloudsql_instance_database`。`user`, `client_addr`, `action`, `application`, `controller`, `db_driver`, `framework`, `route`, `tag_hash`, `project_id`, `resource_id`。
  15. `cloudsql.googleapis.com/database/postgresql/insights/pertag/io_time`: 自上次采样以来每标签的累计 IO 时间。`cloudsql_instance_database`。`user`, `client_addr`, `action`, `application`, `controller`, `db_driver`, `framework`, `route`, `io_type`, `tag_hash`, `project_id`, `resource_id`。
  16. `cloudsql.googleapis.com/database/postgresql/insights/pertag/lock_time`: 自上次采样以来每标签的累计锁等待时间。`cloudsql_instance_database`。`user`, `client_addr`, `action`, `application`, `controller`, `db_driver`, `framework`, `route`, `lock_type`, `tag_hash`, `project_id`, `resource_id`。
  17. `cloudsql.googleapis.com/database/postgresql/insights/pertag/shared_blk_access_count`: 每标签语句执行访问的共享块数量。`cloudsql_instance_database`。`user`, `client_addr`, `action`, `application`, `controller`, `db_driver`, `framework`, `route`, `access_type`, `tag_hash`, `project_id`, `resource_id`。
  18. `cloudsql.googleapis.com/database/postgresql/insights/pertag/row_count`: 自上次采样以来每标签检索或受影响的行数。`cloudsql_instance_database`。`user`, `client_addr`, `action`, `application`, `controller`, `db_driver`, `framework`, `route`, `tag_hash`, `project_id`, `resource_id`。
---
