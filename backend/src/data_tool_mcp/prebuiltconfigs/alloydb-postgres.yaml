kind: tool
name: list_tables
type: postgres-list-tables
source: alloydb-pg-source
description: 以 JSON 格式列出用户创建的表（普通表或分区表）的详细模式信息（对象类型、列、约束、索引、触发器、所有者、注释）。支持按逗号分隔的名称列表进行过滤。如果省略名称，则列出用户模式中的所有表。
