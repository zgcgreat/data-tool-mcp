kind: tool
name: list_autovacuum_configurations
type: postgres-sql
source: alloydb-pg-source
description: 列出 pg_settings 中 PostgreSQL autovacuum 相关配置（名称和当前设置）。
statement: |
  SELECT name,
      setting
  FROM   pg_settings
  WHERE  category = 'Autovacuum';
---
kind: tool
name: list_memory_configurations
type: postgres-sql
source: alloydb-pg-source
description: 列出 pg_settings 中 PostgreSQL 内存相关配置（名称和当前设置）。
statement: |
  (
      SELECT
      name,
      pg_size_pretty((setting::bigint * 1024)::bigint) setting
      FROM pg_settings
      WHERE name IN ('work_mem', 'maintenance_work_mem')
  )
  UNION ALL
  (
      SELECT
      name,
      pg_size_pretty((((setting::bigint) * 8) * 1024)::bigint)
      FROM pg_settings
      WHERE name IN ('shared_buffers', 'wal_buffers', 'effective_cache_size', 'temp_buffers')
  )
  ORDER BY 1 DESC;
---
kind: tool
name: list_top_bloated_tables
type: postgres-sql
source: alloydb-pg-source
description: |
  列出按死元组（近似膨胀信号）排序的前若干张表，返回模式、表、活/死元组、百分比以及上次 vacuum/analyze 的时间。
statement: |
  SELECT
      schemaname AS schema_name,
      relname AS relation_name,
      n_live_tup AS live_tuples,
      n_dead_tup AS dead_tuples,
      TRUNC((n_dead_tup::NUMERIC / NULLIF(n_live_tup + n_dead_tup, 0)) * 100, 2) AS dead_tuple_percentage,
      last_vacuum,
      last_autovacuum,
      last_analyze,
      last_autoanalyze
  FROM pg_stat_user_tables
  ORDER BY n_dead_tup DESC
  LIMIT COALESCE($1::int, 50);
parameters:
- name: limit
  description: 要返回的最大结果数。
  type: integer
  default: 50
---
kind: tool
name: list_replication_slots
type: postgres-sql
source: alloydb-pg-source
description: 列出所有 PostgreSQL 复制槽的关键细节（例如类型、数据库、活动状态），并计算被该槽阻止删除的未处理 WAL 的大小。
statement: |
  SELECT
  slot_name,
  slot_type,
  plugin,
  database,
  temporary,
  active,
  restart_lsn,
  confirmed_flush_lsn,
  xmin,
  catalog_xmin,
  pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS retained_wal
  FROM pg_replication_slots;
---
kind: tool
name: list_invalid_indexes
type: postgres-sql
source: alloydb-pg-source
description: 列出所有无效的 PostgreSQL 索引，这些索引占用磁盘空间但查询规划器无法使用。通常由失败的 CREATE INDEX CONCURRENTLY 操作创建。
statement: |
  SELECT
      nspname AS schema_name,
      indexrelid::regclass AS index_name,
      indrelid::regclass AS table_name,
      pg_size_pretty(pg_total_relation_size(indexrelid)) AS index_size,
      indisready,
      indisvalid,
      pg_get_indexdef(pg_class.oid) AS index_def
  FROM pg_index
  JOIN pg_class ON pg_class.oid = pg_index.indexrelid
  JOIN pg_namespace ON pg_namespace.oid = pg_class.relnamespace
  WHERE indisvalid = FALSE;
---
kind: tool
name: get_query_plan
type: postgres-sql
source: alloydb-pg-source
description: 为单条 SQL 语句生成 JSON 格式的 PostgreSQL EXPLAIN 计划——不会执行该语句。返回优化器估计的计划、成本和行数（无 ANALYZE，无额外选项）。可在生产环境中安全用于计划检查、回归测试和查询调优工作流。
statement: |
  EXPLAIN (FORMAT JSON) {{.query}};
templateParameters:
- name: query
  type: string
  description: 要为其生成计划的 SQL 语句（省略 EXPLAIN 关键字）。
  required: true
