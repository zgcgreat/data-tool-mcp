kind: source
name: bigquery-source
type: bigquery
project: ${BIGQUERY_PROJECT}
location: ${BIGQUERY_LOCATION:}
useClientOAuth: ${BIGQUERY_USE_CLIENT_OAUTH:false}
scopes: ${BIGQUERY_SCOPES:}
maxQueryResultRows: ${BIGQUERY_MAX_QUERY_RESULT_ROWS:50}
impersonateServiceAccount: ${BIGQUERY_IMPERSONATE_SERVICE_ACCOUNT:}
maximumBytesBilled: ${BIGQUERY_MAXIMUM_BYTES_BILLED:0}
---
kind: tool
name: analyze_contribution
type: bigquery-analyze-contribution
source: bigquery-source
description: 使用此工具分析多维数据中关键指标变化的贡献。
---
kind: tool
name: ask_data_insights
type: bigquery-conversational-analytics
source: bigquery-source
description: |
  使用此工具执行数据分析、获取洞察，
  或回答有关特定 BigQuery 表内容的
  复杂问题。
---
kind: tool
name: execute_sql
type: bigquery-execute-sql
source: bigquery-source
description: 使用此工具执行 SQL 语句。
---
kind: tool
name: forecast
type: bigquery-forecast
source: bigquery-source
description: 使用此工具预测时间序列数据。
---
kind: tool
name: get_dataset_info
type: bigquery-get-dataset-info
source: bigquery-source
description: 使用此工具获取数据集元数据。
---
kind: tool
name: get_table_info
type: bigquery-get-table-info
source: bigquery-source
description: 使用此工具获取表元数据。
---
kind: tool
name: list_dataset_ids
type: bigquery-list-dataset-ids
source: bigquery-source
description: 使用此工具列出数据集。
---
kind: tool
name: list_table_ids
type: bigquery-list-table-ids
source: bigquery-source
description: 使用此工具列出表。
---
kind: tool
name: search_catalog
type: bigquery-search-catalog
source: bigquery-source
description: 使用此工具查找表、视图、模型、例程或连接。
---
kind: toolset
name: data
tools:
- execute_sql
- list_dataset_ids
- list_table_ids
- get_dataset_info
- get_table_info
- search_catalog
---
kind: toolset
name: analytics
tools:
- analyze_contribution
- ask_data_insights
- forecast
- search_catalog
