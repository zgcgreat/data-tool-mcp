kind: tool
name: get_system_metrics
type: cloud-monitoring-query-prometheus
source: cloud-monitoring-source
description: |
  使用 PromQL 查询获取 MySQL 实例的系统级 cloudmonitoring 数据（时间序列指标）。从用户处获取需要获取指标时间序列数据的 projectId 和 instanceId。
  使用此工具时，必须提供 Google Cloud `projectId` 和 PromQL `query`。

  为 MySQL 系统指标生成 PromQL `query`。使用提供的指标和规则构建查询，从用户意图中获取 `instance_id` 等标签。

  默认值：
  1. 时间间隔：除非用户指定了不同的窗口，否则 `_over_time` 聚合函数使用默认间隔 `5m`。

  PromQL 查询示例：
  1. 基本时间序列：`avg_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m])`
  2. 前 K 个：`topk(30, avg_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m]))`
  3. 平均值：`avg(avg_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m]))`
  4. 最小值：`min(min_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m]))`
  5. 最大值：`max(max_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m]))`
  6. 总和：`sum(avg_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m]))`
  7. 计数流：`count(avg_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m]))`
  8. 按 database_id 分组的百分位数：`quantile by ("database_id")(0.99,avg_over_time({"__name__"="cloudsql.googleapis.com/database/cpu/utilization","monitored_resource"="cloudsql_database","project_id"="my-projectId","database_id"="my-projectId:my-instanceId"}[5m]))`

  可用指标列表：指标名称。描述。受监控资源。标签。database_id 实际上是实例 ID，格式为 `project_id:instance_id`。
  1. `cloudsql.googleapis.com/database/cpu/utilization`：当前 CPU 利用率占预留 CPU 的百分比。`cloudsql_database`。`database`, `project_id`, `database_id`。
  2. `cloudsql.googleapis.com/database/network/connections`：连接到数据库实例的连接数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  3. `cloudsql.googleapis.com/database/network/received_bytes_count`：通过网络接收的字节数增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  4. `cloudsql.googleapis.com/database/network/sent_bytes_count`：通过网络发送的字节数增量计数。`cloudsql_database`。`destination`, `database`, `project_id`, `database_id`。
  5. `cloudsql.googleapis.com/database/memory/components`：各组件（如使用量、缓存和空闲内存）的内存使用情况。`cloudsql_database`。`component`, `database`, `project_id`, `database_id`。
  6. `cloudsql.googleapis.com/database/disk/bytes_used_by_data_type`：数据使用量（字节）。`cloudsql_database`。`data_type`, `database`, `project_id`, `database_id`。
  7. `cloudsql.googleapis.com/database/disk/read_ops_count`：数据磁盘读取 IO 操作的增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  8. `cloudsql.googleapis.com/database/disk/write_ops_count`：数据磁盘写入 IO 操作的增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  9. `cloudsql.googleapis.com/database/mysql/queries`：服务器执行的语句增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  10. `cloudsql.googleapis.com/database/mysql/questions`：客户端发送的语句增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  11. `cloudsql.googleapis.com/database/mysql/received_bytes_count`：MySQL 进程接收的字节数增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  12. `cloudsql.googleapis.com/database/mysql/sent_bytes_count`：MySQL 进程发送的字节数增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  13. `cloudsql.googleapis.com/database/mysql/innodb_buffer_pool_pages_dirty`：InnoDB 缓冲池中未刷新页面的数量。`cloudsql_database`。`database`, `project_id`, `database_id`。
  14. `cloudsql.googleapis.com/database/mysql/innodb_buffer_pool_pages_free`：InnoDB 缓冲池中未使用页面的数量。`cloudsql_database`。`database`, `project_id`, `database_id`。
  15. `cloudsql.googleapis.com/database/mysql/innodb_buffer_pool_pages_total`：InnoDB 缓冲池中的总页面数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  16. `cloudsql.googleapis.com/database/mysql/innodb_data_fsyncs`：InnoDB fsync() 调用的增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  17. `cloudsql.googleapis.com/database/mysql/innodb_os_log_fsyncs`：对日志文件的 InnoDB fsync() 调用的增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  18. `cloudsql.googleapis.com/database/mysql/innodb_pages_read`：InnoDB 读取页面的增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  19. `cloudsql.googleapis.com/database/mysql/innodb_pages_written`：InnoDB 写入页面的增量计数。`cloudsql_database`。`database`, `project_id`, `database_id`。
  20. `cloudsql.googleapis.com/database/mysql/open_tables`：当前打开的表数量。`cloudsql_database`。`database`, `project_id`, `database_id`。
  21. `cloudsql.googleapis.com/database/mysql/opened_table_count`：自上次采样以来打开的表数量。`cloudsql_database`。`database`, `project_id`, `database_id`。
  22. `cloudsql.googleapis.com/database/mysql/open_table_definitions`：当前缓存的表定义数量。`cloudsql_database`。`database`, `project_id`, `database_id`。
  23. `cloudsql.googleapis.com/database/mysql/opened_table_definitions_count`：自上次采样以来缓存的表定义数量。`cloudsql_database`。`database`, `project_id`, `database_id`。
  24. `cloudsql.googleapis.com/database/mysql/innodb/dictionary_memory`：为 InnoDB 字典缓存分配的内存。`cloudsql_database`。`database`, `project_id`, `database_id`。
---
