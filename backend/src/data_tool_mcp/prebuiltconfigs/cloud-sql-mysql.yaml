kind: tool
name: execute_sql
type: mysql-execute-sql
source: cloud-sql-mysql-source
description: 使用此工具执行 SQL。
---
kind: tool
name: list_active_queries
type: mysql-list-active-queries
source: cloud-sql-mysql-source
description: 列出 processlist 和 innodb_trx 中按执行时间降序排列的前 N 条（默认 10 条）正在进行的查询。以 JSON 格式返回这些查询的详细信息，包括进程 ID、查询语句、事务持续时间、事务等待持续时间、进程时间、事务状态、进程状态、用户名及主机、事务锁定行数、事务修改行数和数据库模式。
---
kind: tool
name: get_query_plan
type: mysql-get-query-plan
source: cloud-sql-mysql-source
description: "提供关于 MySQL 如何执行 SQL 语句的信息。常见用例包括：1) 分析查询计划以提升其性能，2) 确定现有索引的有效性并评估新索引。在 sql_statement 中传入单条 SQL 语句；该工具返回其执行计划而不会实际运行它。"
---
kind: tool
name: list_tables
type: mysql-list-tables
source: cloud-sql-mysql-source
description: 以 JSON 格式列出用户创建的表（普通表或分区表）的详细模式信息（对象类型、列、约束、索引、触发器、注释）。通过逗号分隔的名称列表进行过滤。如果省略名称，则列出用户模式中的所有表。
---
kind: tool
name: list_table_stats
type: mysql-list-table-stats
source: cloud-sql-mysql-source
description: 显示整个实例、指定数据库或指定表的表统计信息，包括表大小、总延迟、读取行数、写入行数、读写延迟。指定数据库名或表名可将输出过滤到特定的数据库或表。结果默认限制为 10 条。
---
kind: tool
name: list_tables_missing_unique_indexes
type: mysql-list-tables-missing-unique-indexes
source: cloud-sql-mysql-source
description: 查找没有主键或唯一键约束的表。主键或唯一键是保证行唯一性的唯一机制。如果没有它们，将缺少数据库级别的数据完整性问题保护。
---
kind: tool
name: list_table_fragmentation
type: mysql-list-table-fragmentation
source: cloud-sql-mysql-source
description: 列出 MySQL 中的表碎片情况，通过计算数据和索引文件的大小以及分配给每个表的空闲空间。查询计算碎片百分比，表示空闲空间相对于总数据和索引大小的比例。对于高碎片率的表，可以使用 OPTIMIZE TABLE 回收存储空间。
---
kind: tool
name: list_all_locks
type: mysql-list-all-locks
source: cloud-sql-mysql-source
description: 列出指定数据库中按查询执行时间降序排列的前 N 个（默认 10 个）锁。
---
kind: tool
name: show_query_stats
type: mysql-show-query-stats
source: cloud-sql-mysql-source
description: 显示查询执行统计信息，包括执行次数、总延迟和平均延迟、最大延迟、总扫描行数、全表扫描和低效索引使用情况。
