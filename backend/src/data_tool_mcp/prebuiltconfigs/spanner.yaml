kind: source
name: spanner-source
type: spanner
project: ${SPANNER_PROJECT}
instance: ${SPANNER_INSTANCE}
database: ${SPANNER_DATABASE}
dialect: ${SPANNER_DIALECT:googlesql}
---
kind: tool
name: execute_sql
type: spanner-execute-sql
source: spanner-source
description: 使用此工具执行 DML SQL。请使用 ${SPANNER_DIALECT:googlesql} 接口进行 Spanner 操作。
---
kind: tool
name: execute_sql_dql
type: spanner-execute-sql
source: spanner-source
description: 使用此工具执行 DQL SQL。请使用 ${SPANNER_DIALECT:googlesql} 接口进行 Spanner 操作。
readOnly: true
---
kind: tool
name: list_tables
type: spanner-list-tables
source: spanner-source
description: 以 JSON 格式列出用户创建的表（普通表或分区表）的详细模式信息（对象类型、列、约束、索引）。通过逗号分隔的名称列表进行过滤。如果省略名称，则列出用户模式中的所有表。输出可以是 'simple'（仅表名）或 'detailed'（完整模式）。
---
kind: tool
name: list_graphs
type: spanner-list-graphs
source: spanner-source
description: 以 JSON 格式列出用户创建的图的详细图模式信息（节点表、边表、标签和属性声明）。通过逗号分隔的图名称列表进行过滤。如果省略名称，则列出所有图。输出可以是 'simple'（仅图名称）或 'detailed'（完整模式）。
---
kind: tool
name: search_catalog
type: spanner-search-catalog
source: spanner-source
description: 根据提供的搜索查询在目录中搜索数据资产（例如 Spanner 实例、表、视图或数据库）
---
kind: toolset
name: data
tools:
- execute_sql
- execute_sql_dql
- list_tables
- list_graphs
---
kind: toolset
name: data_with_discovery
tools:
- execute_sql
- execute_sql_dql
- list_tables
- list_graphs
- search_catalog

