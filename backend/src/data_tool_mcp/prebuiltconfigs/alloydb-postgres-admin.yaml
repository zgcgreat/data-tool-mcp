kind: source
name: alloydb-admin-source
type: alloydb-admin
defaultProject: ${ALLOYDB_POSTGRES_PROJECT:}
---
kind: tool
name: create_cluster
type: alloydb-create-cluster
source: alloydb-admin-source
---
kind: tool
name: wait_for_operation
type: alloydb-wait-for-operation
source: alloydb-admin-source
delay: 1s
maxDelay: 4m
multiplier: 2
maxRetries: 10
---
kind: tool
name: create_instance
type: alloydb-create-instance
source: alloydb-admin-source
---
kind: tool
name: list_clusters
type: alloydb-list-clusters
source: alloydb-admin-source
---
kind: tool
name: list_instances
type: alloydb-list-instances
source: alloydb-admin-source
---
kind: tool
name: list_users
type: alloydb-list-users
source: alloydb-admin-source
---
kind: tool
name: create_user
type: alloydb-create-user
source: alloydb-admin-source
---
kind: tool
name: get_cluster
type: alloydb-get-cluster
source: alloydb-admin-source
---
kind: tool
name: get_instance
type: alloydb-get-instance
source: alloydb-admin-source
---
kind: tool
name: get_user
type: alloydb-get-user
source: alloydb-admin-source
---
kind: toolset
name: alloydb_postgres_admin_tools
tools:
- create_cluster
- wait_for_operation
- create_instance
- list_clusters
- list_instances
- list_users
- create_user
- get_cluster
- get_instance
- get_user
