kind: source
name: postgresql-source
type: postgres
host: ${POSTGRES_HOST:localhost}
port: ${POSTGRES_PORT:5432}
database: ${POSTGRES_DATABASE}
user: ${POSTGRES_USER}
password: ${POSTGRES_PASSWORD}
queryParams: ${POSTGRES_QUERY_PARAMS:}
---
kind: tool
name: execute_sql
type: postgres-execute-sql
source: postgresql-source
description: 使用此工具执行单条 SQL 语句。
---
kind: tool
name: list_tables
type: postgres-list-tables
source: postgresql-source
description: 以 JSON 格式列出用户创建的表（普通表或分区表）的详细 Schema 信息（对象类型、列、约束、索引、触发器、所有者、注释）。支持按表名列表过滤，省略则列出所有用户 Schema 中的表。
---
kind: tool
name: list_active_queries
type: postgres-list-active-queries
source: postgresql-source
description: 列出 pg_stat_activity 中当前正在运行的查询（state='active'）的前 N 条（默认 50），按运行时间从长到短排序。返回 pid、用户、数据库、应用名、客户端地址、状态、等待事件类型/事件、后端/事务/查询开始时间、计算出的查询持续时间以及 SQL 文本。
---
kind: tool
name: list_available_extensions
type: postgres-list-available-extensions
source: postgresql-source
description: 发现当前服务器上可安装的所有 PostgreSQL 扩展，返回名称、默认版本和描述。
---
kind: tool
name: list_installed_extensions
type: postgres-list-installed-extensions
source: postgresql-source
description: 列出所有已安装的 PostgreSQL 扩展及其名称、版本、Schema、所有者和描述。
---
kind: tool
name: long_running_transactions
type: postgres-long-running-transactions
source: postgresql-source
description: 识别并列出超过指定时间限制的数据库事务。对于每个长时间运行的事务，输出包含进程 ID、数据库名、用户名、应用名、客户端地址、状态、连接时长、事务时长、查询时长、最后活动时长、等待事件类型、等待事件以及查询字符串。
---
kind: tool
name: list_locks
type: postgres-list-locks
source: postgresql-source
description: 识别活跃进程所持有的所有锁，显示进程 ID、用户、查询文本，以及与每个进程关联的所有事务和具体锁（关系、模式、授予状态）的聚合列表。
---
kind: tool
name: replication_stats
type: postgres-replication-stats
source: postgresql-source
description: 列出每个副本的进程 ID、用户名、应用名、backend_xmin（由 hot_standby_feedback 上报的备库 xmin 水位）、客户端 IP 地址、连接状态和 sync_state，以及 sent_lag（主库到已发送）、write_lag（已发送到已写入）、flush_lag（已写入到已刷盘）、replay_lag（已刷盘到已回放）和总体 total_lag（主库到已回放）的字节级延迟大小。
---
kind: tool
name: list_autovacuum_configurations
type: postgres-sql
source: postgresql-source
description: 列出 pg_settings 中与 PostgreSQL autovacuum 相关的配置项（名称和当前设置）。
statement: |
  SELECT name,
      setting
  FROM   pg_settings
  WHERE  category = 'Autovacuum';
---
kind: tool
name: list_memory_configurations
type: postgres-sql
source: postgresql-source
description: 列出 pg_settings 中与 PostgreSQL 内存相关的配置项（名称和当前设置）。
statement: |
  (
      SELECT
      name,
      pg_size_pretty((setting::bigint * 1024)::bigint) setting
      FROM pg_settings
      WHERE name IN ('work_mem', 'maintenance_work_mem')
  )
  UNION ALL
  (
      SELECT
      name,
      pg_size_pretty((((setting::bigint) * 8) * 1024)::bigint)
      FROM pg_settings
      WHERE name IN ('shared_buffers', 'wal_buffers', 'effective_cache_size', 'temp_buffers')
  )
  ORDER BY 1 DESC;
---
kind: tool
name: list_top_bloated_tables
type: postgres-sql
source: postgresql-source
description: |
  按死元组（近似膨胀信号）排序列出顶部表，返回 Schema、表名、活/死元组数、百分比以及最近的 vacuum/analyze 时间。
statement: |
  SELECT
      schemaname AS schema_name,
      relname AS relation_name,
      n_live_tup AS live_tuples,
      n_dead_tup AS dead_tuples,
      TRUNC((n_dead_tup::NUMERIC / NULLIF(n_live_tup + n_dead_tup, 0)) * 100, 2) AS dead_tuple_percentage,
      last_vacuum,
      last_autovacuum,
      last_analyze,
      last_autoanalyze
  FROM pg_stat_user_tables
  ORDER BY n_dead_tup DESC
  LIMIT COALESCE($1::int, 50);
parameters:
- name: limit
  description: 返回结果的最大数量。
  type: integer
  default: 50
---
kind: tool
name: list_replication_slots
type: postgres-sql
source: postgresql-source
description: 列出所有 PostgreSQL 复制槽的关键信息（如类型、数据库、活跃状态等），并计算该槽位阻止移除的 WAL 大小。
statement: |
  SELECT
  slot_name,
  slot_type,
  plugin,
  database,
  temporary,
  active,
  restart_lsn,
  confirmed_flush_lsn,
  xmin,
  catalog_xmin,
  pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS retained_wal
  FROM pg_replication_slots;
---
kind: tool
name: list_invalid_indexes
type: postgres-sql
source: postgresql-source
description: 列出所有无效的 PostgreSQL 索引，这些索引占用磁盘空间但查询规划器无法使用。通常由失败的 CREATE INDEX CONCURRENTLY 操作创建。
statement: |
  SELECT
      nspname AS schema_name,
      indexrelid::regclass AS index_name,
      indrelid::regclass AS table_name,
      pg_size_pretty(pg_total_relation_size(indexrelid)) AS index_size,
      indisready,
      indisvalid,
      pg_get_indexdef(pg_class.oid) AS index_def
  FROM pg_index
  JOIN pg_class ON pg_class.oid = pg_index.indexrelid
  JOIN pg_namespace ON pg_namespace.oid = pg_class.relnamespace
  WHERE indisvalid = FALSE;
---
kind: tool
name: get_query_plan
type: postgres-sql
source: postgresql-source
description: 为单条 SQL 语句生成 JSON 格式的 PostgreSQL EXPLAIN 计划——不会执行该语句。返回优化器估计的计划、成本和行数（无 ANALYZE，无额外选项）。可安全用于生产环境的计划检查、回归检查和查询调优。
statement: |
  EXPLAIN (FORMAT JSON) {{.query}};
templateParameters:
- name: query
  type: string
  description: 要为其生成计划的 SQL 语句（省略 EXPLAIN 关键字）。
  required: true
