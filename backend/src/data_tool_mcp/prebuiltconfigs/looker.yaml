kind: tool
name: get_looks
type: looker-get-looks
source: looker-source
description: |
  此工具在 Looker 实例中搜索已保存的 Look（预定义查询和可视化）。
  它返回 JSON 对象列表，每个对象代表一个 Look。

  搜索参数：
  - title（可选）：按 Look 标题过滤（支持通配符）。
  - folder_id（可选）：按保存 Look 的文件夹 ID 过滤。
  - user_id（可选）：按创建 Look 的用户 ID 过滤。
  - description（可选）：按描述内容过滤（支持通配符）。
  - id（可选）：按特定 Look ID 过滤。
  - limit（可选）：返回结果的最大数量。默认为系统限制。
  - offset（可选）：分页的起始点。

  字符串搜索行为：
  - 不区分大小写匹配。
  - 支持 SQL LIKE 模式匹配通配符：
    - `%`：匹配零个或多个字符的任意序列。（例如，`"dan%"` 匹配 "danger"、"Danzig"）
    - `_`：匹配任意单个字符。（例如，`"D_m%"` 匹配 "Damage"、"dump"）
  - 用于空值检查的特殊表达式：
    - `"IS NULL"`：匹配字段为空的 Look。
    - `"NOT NULL"`：排除字段为空的 Look。
---
kind: tool
name: run_look
type: looker-run-look
source: looker-source
description: |
  此工具执行与已保存 Look 关联的查询，并以 JSON 结构返回结果数据。

  参数：
  - look_id（必填）：要运行的 Look 的唯一标识符，
    通常从 `get_looks` 工具获取。

  输出：
  查询结果以 JSON 对象形式返回。
---
kind: tool
name: make_look
type: looker-make-look
source: looker-source
description: |
  此工具在 Looker 中创建新的 Look（带可视化的已保存查询）。
  Look 将保存在用户的个人文件夹中，其名称必须唯一。

  必填参数：
  - title：新 Look 的唯一标题。
  - description：Look 用途的简要描述。
  - model_name：LookML 模型的名称（来自 `get_models`）。
  - explore_name：探索的名称（来自 `get_explores`）。
  - fields：要包含在查询中的字段名列表（维度、度量、过滤器或参数）。

  可选参数：
  - pivots、filters、sorts、limit、query_timezone：这些参数与
    `query` 工具中描述的参数相同。
  - vis_config：定义 Look 可视化设置的 JSON 对象。
    结构和选项与 `query_url` 工具的 `vis_config` 相同。

  输出：
  包含指向新创建 Look 的链接（`url`）及其 `id` 和 `slug` 的 JSON 对象。
---
kind: tool
name: get_dashboards
type: looker-get-dashboards
source: looker-source
description: |
  此工具在 Looker 实例中搜索已保存的仪表板。它返回 JSON 对象列表，每个对象代表一个仪表板。

  搜索参数：
  - title（可选）：按仪表板标题过滤（支持通配符）。
  - folder_id（可选）：按保存仪表板的文件夹 ID 过滤。
  - user_id（可选）：按创建仪表板的用户 ID 过滤。
  - description（可选）：按描述内容过滤（支持通配符）。
  - id（可选）：按特定仪表板 ID 过滤。
  - limit（可选）：返回结果的最大数量。默认为系统限制。
  - offset（可选）：分页的起始点。

  字符串搜索行为：
  - 不区分大小写匹配。
  - 支持 SQL LIKE 模式匹配通配符：
    - `%`：匹配零个或多个字符的任意序列。（例如，`"finan%"` 匹配 "financial"、"finance"）
    - `_`：匹配任意单个字符。（例如，`"s_les"` 匹配 "sales"）
  - 用于空值检查的特殊表达式：
    - `"IS NULL"`：匹配字段为空的仪表板。
    - `"NOT NULL"`：排除字段为空的仪表板。
---
kind: tool
name: run_dashboard
type: looker-run-dashboard
source: looker-source
description: |
  此工具执行指定仪表板中每个磁贴关联的查询，
  并以 JSON 结构返回聚合数据。

  参数：
  - dashboard_id（必填）：要运行的仪表板的唯一标识符，
    通常从 `get_dashboards` 工具获取。

  输出：
  所有仪表板磁贴的数据以 JSON 对象形式返回。
---
kind: tool
name: make_dashboard
type: looker-make-dashboard
source: looker-source
description: |
  此工具在 Looker 中创建新的空仪表板。仪表板存储在用户的个人文件夹中，
  仪表板名称必须唯一。创建后，使用 `add_dashboard_filter` 添加过滤器，
  使用 `add_dashboard_element` 添加内容磁贴。

  必填参数：
  - title（必填）：新仪表板的唯一标题。
  - description（必填）：仪表板用途的简要描述。

  输出：
  包含指向新创建仪表板的链接（`url`）及其唯一 `id` 的 JSON 对象。
  此 `dashboard_id` 对于后续调用 `add_dashboard_filter` 和
  `add_dashboard_element` 至关重要。
---
kind: tool
name: add_dashboard_element
type: looker-add-dashboard-element
source: looker-source
description: |
  此工具在现有 Looker 仪表板中创建新的磁贴（元素）。
  对于给定的 `dashboard_id`，磁贴按调用此工具的顺序添加。

  关键操作顺序：
  1. 使用 `make_dashboard` 创建仪表板。
  2. 使用 `add_dashboard_filter` 添加任何仪表板级过滤器。
  3. 然后，使用此工具添加元素（磁贴）。

  必填参数：
  - dashboard_id：目标仪表板的 ID，从 `make_dashboard` 获取。
  - model_name、explore_name、fields：这些查询参数继承自
    `query` 工具，用于定义磁贴的数据。

  可选参数：
  - title：仪表板磁贴的可选标题。
  - pivots、filters、sorts、limit、query_timezone：这些查询参数
    继承自 `query` 工具，可用于自定义磁贴的查询。
  - vis_config：定义此磁贴可视化设置的 JSON 对象。
    结构和选项与 `query_url` 工具的 `vis_config` 相同。

  连接到仪表板过滤器：
  仪表板元素可以连接到一个或多个仪表板过滤器（使用
  `add_dashboard_filter` 创建）。为此，请指定仪表板过滤器的 `name`
  以及过滤器应应用到的元素查询中的 `field`。
  指定字段的格式为 `view_name.field_name`。
---
kind: tool
name: add_dashboard_filter
type: looker-add-dashboard-filter
source: looker-source
description: |
  此工具向 Looker 仪表板添加过滤器。

  关键操作顺序：
  1. 使用 `make_dashboard` 创建仪表板。
  2. 使用此工具（`add_dashboard_filter`）添加所有所需的过滤器。
  3. 最后，使用 `add_dashboard_element` 添加仪表板元素（磁贴）。

  参数：
  - dashboard_id（必填）：来自 `make_dashboard` 的 ID。
  - name（必填）：过滤器的唯一内部标识符。稍后将在 `add_dashboard_element` 中使用此 `name` 将磁贴绑定到此过滤器。
  - title（必填）：在 UI 中向用户显示的标签。
  - filter_type（必填）：`date_filter`、`number_filter`、`string_filter` 或 `field_filter` 之一。
  - default_value（可选）：过滤器的初始值。

  字段过滤器（`filter_type: field_filter`）：
  如果创建字段过滤器，还必须提供：
  - model
  - explore
  - dimension
  过滤器将从此 LookML 字段继承建议和类型信息。
---
kind: tool
name: generate_embed_url
type: looker-generate-embed-url
source: looker-source
description: |
  此工具为特定 Looker 内容生成签名的私有嵌入 URL，
  允许用户直接访问。

  参数：
  - type（必填）：要嵌入的内容类型。常见值包括：
    - `dashboards`
    - `looks`
    - `explore`
  - id（必填）：内容的唯一标识符。
    - 对于仪表板和 Look，使用数字 ID（例如 "123"）。
    - 对于探索，使用格式 "model_name/explore_name"。
---
