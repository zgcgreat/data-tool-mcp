kind: source
name: looker-source
type: looker
base_url: ${LOOKER_BASE_URL}
client_id: ${LOOKER_CLIENT_ID:}
client_secret: ${LOOKER_CLIENT_SECRET:}
verify_ssl: ${LOOKER_VERIFY_SSL:true}
timeout: 600s
use_client_oauth: ${LOOKER_USE_CLIENT_OAUTH:false}
show_hidden_models: ${LOOKER_SHOW_HIDDEN_MODELS:true}
show_hidden_explores: ${LOOKER_SHOW_HIDDEN_EXPLORES:true}
show_hidden_fields: ${LOOKER_SHOW_HIDDEN_FIELDS:true}
---
kind: tool
name: get_models
type: looker-get-models
source: looker-source
description: |
  此工具检索 Looker 实例中可用的 LookML 模型列表。
  LookML 模型定义了用户可以查询的数据结构和关系。
  输出包括模型的 `name` 和 `label` 等详细信息，
  这些信息对于后续调用 `get_explores` 或 `query` 等工具至关重要。

  此工具不接受任何参数。
---
kind: tool
name: get_explores
type: looker-get-explores
source: looker-source
description: |
  此工具检索特定 LookML 模型中定义的探索列表。
  探索代表数据的精选视图，通常将多个表连接在一起，
  以便对特定主题领域进行聚焦分析。
  输出提供探索的 `name` 和 `label` 等详细信息。

  参数：
  - model_name（必填）：LookML 模型的名称，从 `get_models` 获取。
---
kind: tool
name: get_dimensions
type: looker-get-dimensions
source: looker-source
description: |
  此工具检索特定 Looker 探索中定义的维度列表。
  维度是数据的非聚合属性或特征
  （例如，产品名称、订单日期、客户城市），可用于分组、
  过滤或分段查询结果。

  参数：
  - model_name（必填）：LookML 模型的名称，从 `get_models` 获取。
  - explore_name（必填）：模型中探索的名称，从 `get_explores` 获取。

  输出详情：
  - 如果维度包含 `suggestions` 字段，其内容是有效值，
    可直接用作该维度的过滤器。
  - 如果提供了 `suggest_explore` 和 `suggest_dimension`，可以查询
    指定的探索和维度以检索有效的过滤器值列表。
---
kind: tool
name: get_measures
type: looker-get-measures
source: looker-source
description: |
  此工具检索特定 Looker 探索中定义的度量列表。
  度量是可聚合的指标（例如，总销售额、平均价格、用户数），
  用于查询中的计算和定量分析。

  参数：
  - model_name（必填）：LookML 模型的名称，从 `get_models` 获取。
  - explore_name（必填）：模型中探索的名称，从 `get_explores` 获取。

  输出详情：
  - 如果度量包含 `suggestions` 字段，其内容是有效值，
    可直接用作该度量的过滤器。
  - 如果提供了 `suggest_explore` 和 `suggest_dimension`，可以查询
    指定的探索和维度以检索有效的过滤器值列表。
---
kind: tool
name: get_filters
type: looker-get-filters
source: looker-source
description: |
  此工具检索特定 Looker 探索中定义的"仅过滤字段"列表。
  这些是在 LookML 中专门定义的特殊字段，用于
  创建面向用户的过滤控件，不直接影响 SQL 查询的 `GROUP BY`
  子句。它们通常与 liquid 模板结合使用
  来创建动态查询。

  注意：常规维度和度量也可以用作查询中的过滤器。
  此工具*仅*返回在 LookML 中明确定义为 `filter:` 的字段。

  参数：
  - model_name（必填）：LookML 模型的名称，从 `get_models` 获取。
  - explore_name（必填）：模型中探索的名称，从 `get_explores` 获取。
---
kind: tool
name: get_parameters
type: looker-get-parameters
source: looker-source
description: |
  此工具检索特定 Looker 探索中定义的参数列表。
  LookML 参数是动态输入字段，允许用户影响查询行为
  而无需直接修改底层 LookML。它们通常与
  `liquid` 模板一起使用来创建灵活的仪表板和报告，
  使用户能够在运行时选择维度、度量或其他查询组件。

  参数：
  - model_name（必填）：LookML 模型的名称，从 `get_models` 获取。
  - explore_name（必填）：模型中探索的名称，从 `get_explores` 获取。
---
kind: tool
name: query
type: looker-query
source: looker-source
description: |
  此工具对 LookML 模型运行查询并以 JSON 格式返回结果。

  必填参数：
  - model_name：LookML 模型的名称（来自 `get_models`）。
  - explore_name：探索的名称（来自 `get_explores`）。
  - fields：要包含在查询中的字段名列表（维度、度量、过滤器或参数）。

  可选参数：
  - pivots：用于透视结果的字段列表。这些字段也必须包含在 `fields` 列表中。
  - filters：过滤器表达式的映射，例如 `{"view.field": "value", "view.date": "7 days"}`。
    - 字段名不要加引号。
    - 使用 `not null` 而不是 `-NULL`。
    - 如果值包含逗号，请用单引号括起来（例如 "'New York, NY'"）。
  - filter_expression：Looker 表达式过滤字符串（自定义过滤器）。允许复杂逻辑和字段比较。
    - 使用 `${view.field_name}` 语法引用字段。
    - 支持逻辑运算符（`AND`、`OR`、`NOT`）和比较运算符。
    - 支持 Looker 函数（例如 `matches_filter`、`now`、`add_days`、`diff_days`）。
    - 示例：
      - `${orders.order_date} < add_years(-1, now())`
      - `${activity.email} != ${activity_drive_facts.current_owner_email}`
      - `matches_filter(${order.order_month}, '24 months') AND matches_filter(${order.order_month}, 'before 2024/07/01')`
  - dynamic_fields：动态字段（表格计算、自定义度量、自定义维度）的可选数组，定义为 JSON 对象。
    - 适用于 LookML 模型中未定义的临时计算。
    - 使用 `${view.field_name}` 语法引用字段。
    - 示例：
      - 表格计算：`[{"table_calculation": "test", "label": "test", "expression": "${order_items.total_sale_price} * 0.8", "_type_hint": "number"}]`
      - 自定义维度：`[{"dimension": "days_since_order", "label": "days since order", "expression": "diff_days(${order.order_date}, now())", "_type_hint": "number"}]`
      - 自定义度量：`[{"measure": "sum_of_revenue", "label": "Sum of Revenue", "based_on": "training.revenue", "type": "sum", "_type_hint": "number"}]`
  - sorts：用于排序的字段列表，可选包含方向（例如 `["view.field desc"]`）。
  - limit：行数限制（默认 500）。使用 "-1" 表示无限制。
  - query_timezone：查询的特定时区（例如 `America/Los_Angeles`）。

  注意：使用 `get_dimensions`、`get_measures`、`get_filters` 和 `get_parameters` 查找有效字段。
---
kind: tool
name: query_sql
type: looker-query-sql
source: looker-source
description: |
  此工具生成 Looker 针对给定参数集将对数据库执行的
  底层 SQL 查询。它对于理解 Looker 如何将请求转换为 SQL
  很有用。

  参数：
  此工具的所有参数与 `query` 工具的参数相同。
  包括 `model_name`、`explore_name`、`fields`（必填），
  以及可选参数如 `pivots`、`filters`、`filter_expression`、`dynamic_fields`、`sorts`、`limit` 和 `query_timezone`。

  输出：
  此工具的结果是原始 SQL 文本。
---
kind: tool
name: query_url
type: looker-query-url
source: looker-source
description: |
  此工具为 Looker 查询生成可共享的 URL，允许用户
  在 Looker UI 中进一步探索查询。它返回生成的 URL，
  以及 `query_id` 和 `slug`。

  参数：
  所有查询参数（例如 `model_name`、`explore_name`、`fields`、`pivots`、
  `filters`、`filter_expression`、`dynamic_fields`、`sorts`、`limit`、`query_timezone`）与 `query` 工具相同。

  此外，它接受可选的 `vis_config` 参数：
  - vis_config（可选）：控制默认可视化设置的 JSON 对象。

  vis_config 详情：
  `vis_config` 对象支持多种图表类型的各种属性。
  以下是关于制作可视化的一些说明。

  ### 笛卡尔图表（面积图、柱状图、条形图、折线图、散点图）

  这些图表类型共享大量配置选项。

  **通用**
  *   `type`：可视化类型（`looker_area`、`looker_bar`、`looker_column`、`looker_line`、`looker_scatter`）。
  *   `series_types`：覆盖单个系列的图表类型。
  *   `show_view_names`：在标签和工具提示中显示视图名称（`true`/`false`）。
  *   `series_labels`：为系列提供自定义名称。

  **样式与颜色**
  *   `colors`：用于图表系列的颜色值数组。
  *   `series_colors`：系列名称到特定颜色值的映射。
  *   `color_application`：调色板应用的高级控件（集合、调色板、反转等）。
  *   `font_size`：标签的字体大小（例如 '12px'）。

  **图例**
  *   `hide_legend`：显示或隐藏图表图例（`true`/`false`）。
  *   `legend_position`：图例的位置（`'center'`、`'left'`、`'right'`）。

  **坐标轴**
  *   `swap_axes`：交换 X 轴和 Y 轴（`true`/`false`）。
  *   `x_axis_scale`：x 轴的刻度（`'auto'`、`'ordinal'`、`'linear'`、`'time'`）。
  *   `x_axis_reversed`、`y_axis_reversed`：反转坐标轴方向（`true`/`false`）。
  *   `x_axis_gridlines`、`y_axis_gridlines`：显示坐标轴网格线（`true`/`false`）。
  *   `show_x_axis_label`、`show_y_axis_label`：显示或隐藏坐标轴标题（`true`/`false`）。
  *   `show_x_axis_ticks`、`show_y_axis_ticks`：显示或隐藏坐标轴刻度标记（`true`/`false`）。
  *   `x_axis_label`、`y_axis_label`：为坐标轴设置自定义标题。
  *   `x_axis_datetime_label`：x 轴上日期时间标签的格式字符串（例如 `'%Y-%m'`）。
  *   `x_padding_left`、`x_padding_right`：调整 x 轴两端的内边距。
  *   `x_axis_label_rotation`、`x_axis_label_rotation_bar`：设置 x 轴标签的旋转角度。
  *   `x_axis_zoom`、`y_axis_zoom`：在坐标轴上启用缩放（`true`/`false`）。
  *   `y_axes`：多个 y 轴的配置对象数组。

  **数据与系列**
  *   `stacking`：系列的堆叠方式（`''` 表示无，`'normal'`、`'percent'`）。
  *   `ordering`：堆叠中系列的顺序（`'none'` 等）。
  *   `limit_displayed_rows`：启用或禁用限制显示的行数（`true`/`false`）。
  *   `limit_displayed_rows_values`：行限制的配置（例如 `{ "first_last": "first", "show_hide": "show", "num_rows": 10 }`）。
  *   `discontinuous_nulls`：折线图中空值的渲染方式（`true`/`false`）。
  *   `point_style`：折线图和面积图上点的样式（`'none'`、`'circle'`、`'circle_outline'`）。
  *   `series_point_styles`：覆盖单个系列的点样式。
  *   `interpolation`：线条插值样式（`'linear'`、`'monotone'`、`'step'` 等）。
  *   `show_value_labels`：在数据点上显示值（`true`/`false`）。
  *   `label_value_format`：值标签的格式字符串。
  *   `show_totals_labels`：在堆叠图表上显示总计标签（`true`/`false`）。
  *   `totals_color`：总计标签的颜色。
  *   `show_silhouette`：在堆叠图表中显示隐藏系列的"轮廓"（`true`/`false`）。
  *   `hidden_series`：要从可视化中隐藏的系列名称数组。

  **散点图/气泡图特有**
  *   `size_by_field`：用于确定气泡大小的字段。
  *   `color_by_field`：用于确定气泡颜色的字段。
  *   `plot_size_by_field`：是否在图例中显示大小依据字段。
  *   `cluster_points`：将附近的点分组为簇（`true`/`false`）。
  *   `quadrants_enabled`：在图表上显示象限（`true`/`false`）。
  *   `quadrant_properties`：象限标签和颜色的配置。
  *   `custom_quadrant_value_x`、`custom_quadrant_value_y`：以百分比设置象限边界。
  *   `custom_quadrant_point_x`、`custom_quadrant_point_y`：将象限边界设置为特定值。

  **其他**
  *   `reference_lines`：显示参考线的配置。
  *   `trend_lines`：显示趋势线的配置。
  *   `trellis`：创建 trellis（小多重图）图表的配置。
  *   `crossfilterEnabled`、`crossfilters`：交叉过滤交互的配置。

  ### 箱线图

  *   继承大多数笛卡尔图表选项。
  *   `type`：必须为 `looker_boxplot`。

  ### 漏斗图

  *   `type`：必须为 `looker_funnel`。
  *   `orientation`：数据的读取方式（`'automatic'`、`'dataInRows'`、`'dataInColumns'`）。
  *   `percentType`：百分比的计算方式（`'percentOfMaxValue'`、`'percentOfPriorRow'`）。
  *   `labelPosition`、`valuePosition`、`percentPosition`：标签的位置（`'left'`、`'right'`、`'inline'`、`'hidden'`）。
  *   `labelColor`、`labelColorEnabled`：为标签设置自定义颜色。
  *   `labelOverlap`：允许标签重叠（`true`/`false`）。
  *   `barColors`：漏斗步骤的颜色数组。
  *   `color_application`：高级调色板控件。
  *   `crossfilterEnabled`、`crossfilters`：交叉过滤配置。

  ### 饼图/环形图

  *   饼图必须恰好有一个维度和一个数值度量。
  *   `type`：必须为 `looker_pie`。
  *   `value_labels`：值的显示位置（`'legend'`、`'labels'`）。
  *   `label_type`：数据标签的格式（`'labPer'`、`'labVal'`、`'lab'`、`'val'`、`'per'`）。
  *   `start_angle`、`end_angle`：饼图的起始和结束角度。
  *   `inner_radius`：内半径，用于创建环形图。
  *   `series_colors`、`series_labels`：覆盖特定切片的颜色和标签。
  *   `color_application`：高级调色板控件。
  *   `crossfilterEnabled`、`crossfilters`：交叉过滤配置。
  *   `advanced_vis_config`：包含高级 Highcharts 配置 JSON 的字符串。

  ### 瀑布图

  *   继承大多数笛卡尔图表选项。
  *   `type`：必须为 `looker_waterfall`。
  *   `up_color`：正（增加）值的颜色。
  *   `down_color`：负（减少）值的颜色。
  *   `total_color`：总计条的颜色。

  ### 词云

  *   `type`：必须为 `looker_wordcloud`。
  *   `rotation`：启用随机词语旋转（`true`/`false`）。
  *   `colors`：词语的颜色数组。
  *   `color_application`：高级调色板控件。
  *   `crossfilterEnabled`、`crossfilters`：交叉过滤配置。

